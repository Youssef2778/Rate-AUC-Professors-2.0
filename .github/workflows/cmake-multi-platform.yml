name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu with GCC
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            build_type: Release
          
          # Ubuntu with Clang
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
            build_type: Release
          
          # Windows with MSVC
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            build_type: Release

    steps:
    - uses: actions/checkout@v4

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    # ============================================================================
    # WINDOWS DEPENDENCIES
    # ============================================================================
    - name: Install dependencies on Windows
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        # Install CMake
        choco install -y cmake
        
        # Install Boost via Chocolatey
        choco install -y boost-msvc-14.3
        
        # Set environment variables for CMake
        echo "Boost_INCLUDE_DIR=C:\local\boost" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    # ============================================================================
    # UBUNTU DEPENDENCIES
    # ============================================================================
    - name: Install dependencies on Ubuntu
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          libboost-all-dev \
          mysql-server \
          libmysqlcppconn-dev \
          libssl-dev

    # ============================================================================
    # INSTALL QT VIA ACTION (Cross-platform)
    # ============================================================================
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.5.0'
        modules: 'qt5compat'
        cache: true
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libbcrypt-dev
        
    # ============================================================================
    # CONFIGURE CMAKE
    # ============================================================================
    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    # ============================================================================
    # BUILD
    # ============================================================================
    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    # ============================================================================
    # TEST
    # ============================================================================
    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }}
