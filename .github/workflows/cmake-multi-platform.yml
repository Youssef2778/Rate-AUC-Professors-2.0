name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    # ============================================================================
    # WINDOWS DEPENDENCIES
    # ============================================================================
    - name: Install dependencies on Windows
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        # Install Chocolatey packages
        choco install -y cmake
        
        # Install Qt6
        choco install -y qt6
        
        # Install Boost via Chocolatey
        choco install -y boost-msvc-14.3
        
        # Set Qt paths for CMake
        echo "Qt6_DIR=C:\tools\qt\6.x.x\msvc2022_64\lib\cmake\Qt6" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "Boost_INCLUDE_DIR=C:\local\boost" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    # ============================================================================
    # UBUNTU DEPENDENCIES
    # ============================================================================
    - name: Install dependencies on Ubuntu
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          qt6-base-dev \
          qt6-tools-dev \
          libboost-all-dev \
          mysql-server \
          libmysqlcppconn-dev \
          libssl-dev

    # ============================================================================
    # INSTALL QT VIA ACTION (ALTERNATIVE - More Reliable)
    # ============================================================================
    - name: Install Qt (Cross-platform)
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.5.0'
        modules: 'qtbase qttools'
        cache: true

    # ============================================================================
    # CONFIGURE CMAKE
    # ============================================================================
    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    # ============================================================================
    # BUILD
    # ============================================================================
    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    # ============================================================================
    # TEST
    # ============================================================================
    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }}
